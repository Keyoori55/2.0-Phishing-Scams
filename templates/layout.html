<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector - Cyber Security Shield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container navContainer">
            <a href="/" class="logo">
                <i data-lucide="shield"></i>
                PhishingDetector
            </a>
            <nav class="navLinks" id="navLinks">
                <a href="/" class="navLink">Home</a>
                <a href="/what-is-phishing" class="navLink">What is Phishing?</a>
                <a href="/about" class="navLink">About Project</a>
                <a href="/feedback" class="navLink">Feedback</a>
            </nav>
            <button class="menuBtn" id="menuBtn">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footerContent">
                <div class="footerBrand">
                    <div class="footerLogo">
                        <i data-lucide="shield"></i>
                        PhishingDetector
                    </div>
                </div>
            </div>
            <div class="footerLinks" style="text-align: center; margin-bottom: 2rem;">
                <a href="/">Home</a>
                <a href="/what-is-phishing">What is Phishing?</a>
                <a href="/about">About</a>
                <a href="/feedback">Feedback</a>
            </div>
            <div class="footerBottom">
                <p>&copy; 2026 Phishing Detector Project. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
